<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>楽天市場 広告入札単価調整ツール</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <!-- ヘッダー -->
    <div class="app-header">
      <h1>楽天市場 広告入札単価調整ツール</h1>
    </div>

    <!-- エラーメッセージ -->
    <div id="error-message" class="error-message"></div>

    <!-- ルール設定セクション -->
    <div class="section">
      <div class="section-title">ルール設定</div>

      <div style="overflow-x: auto;">
        <table id="rules-table">
          <thead>
            <tr>
              <th style="width:40px">#</th>
              <th>ROAS下限</th>
              <th>ROAS上限</th>
              <th>クリック数条件</th>
              <th style="width:100px">調整値 (円)</th>
              <th style="width:60px">操作</th>
            </tr>
          </thead>
          <tbody id="rules-tbody"></tbody>
        </table>
      </div>

      <div class="btn-group">
        <button class="btn btn-secondary btn-sm" onclick="UI.addRule()">+ ルール追加</button>
        <button class="btn btn-outline btn-sm" onclick="App.resetRules()">デフォルトに戻す</button>
      </div>

      <div class="field-group">
        <label>入札単価の下限値:</label>
        <input type="number" id="min-bid" class="input-field" min="1" value="20" onchange="UI.saveRulesFromUI()">
        <span class="unit">円</span>
      </div>

      <div class="field-group">
        <label>アラートROAS閾値:</label>
        <input type="number" id="alert-roas" class="input-field" min="0" step="any" value="150" onchange="UI.saveRulesFromUI()">
        <span class="unit">%</span>
      </div>
    </div>

    <!-- ファイルアップロードセクション -->
    <div class="section">
      <div class="section-title">ファイルアップロード</div>

      <div class="upload-area">
        <div class="file-row">
          <label>商品別レポート:</label>
          <input type="file" id="file-item" accept=".csv">
          <span id="status-item" class="file-status"></span>
        </div>
        <div class="file-row">
          <label>キーワード別レポート:</label>
          <input type="file" id="file-keyword" accept=".csv">
          <span id="status-keyword" class="file-status"></span>
        </div>
        <div style="margin-top: 8px;">
          <button id="btn-execute" class="btn btn-primary" disabled onclick="App.execute()">実行</button>
        </div>
      </div>
    </div>

    <!-- 警告 -->
    <div id="warnings" class="warnings"></div>

    <!-- 結果表示セクション -->
    <div id="results-section" class="section" style="display: none;">
      <div class="results-header">
        <div class="left">
          <div class="section-title" style="margin-bottom:0; border-bottom:none; padding-bottom:0;">処理結果</div>
          <span id="result-count" class="result-count"></span>
          <button id="btn-filter-alert" class="btn btn-outline btn-sm" onclick="UI.toggleAlertFilter()">アラートのみ表示</button>
        </div>
        <button id="btn-export" class="btn btn-success" onclick="App.exportCSV()">CSV出力</button>
      </div>

      <div class="results-table-wrap">
        <table id="results-table">
          <thead id="results-thead">
            <tr>
              <th>#</th>
              <th data-sort="id" onclick="UI.sortBy('id')">商品管理番号</th>
              <th>商品ページURL</th>
              <th data-sort="currentBid" onclick="UI.sortBy('currentBid')">現入札単価</th>
              <th data-sort="adjustedROAS" onclick="UI.sortBy('adjustedROAS')">調整後ROAS(%)</th>
              <th data-sort="adjustedClicks" onclick="UI.sortBy('adjustedClicks')">調整後クリック数</th>
              <th data-sort="ruleId" onclick="UI.sortBy('ruleId')">適用ルール</th>
              <th data-sort="adjustment" onclick="UI.sortBy('adjustment')">調整値</th>
              <th data-sort="newBid" onclick="UI.sortBy('newBid')">新入札単価</th>
              <th data-sort="isAlert" onclick="UI.sortBy('isAlert')">アラート</th>
            </tr>
          </thead>
          <tbody id="results-tbody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- encoding-japanese CDN -->
  <script src="https://cdn.jsdelivr.net/npm/encoding-japanese@2.2.0/encoding.min.js"></script>

  <!-- アプリケーションスクリプト -->
  <script src="js/rules.js"></script>
  <script src="js/csv-parser.js"></script>
  <script src="js/processor.js"></script>
  <script src="js/csv-export.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
